<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoggerBot 3000 | IA de Looksmaxing, Blackpill & Estética Facial</title>
    <script>
      // Redirección de seguridad para GitHub Pages si el usuario olvida configurar la carpeta /docs en los ajustes de su repo
      if (window.location.hostname.endsWith('github.io') && !window.location.pathname.includes('/docs/')) {
        const pathWithSlash = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
        window.location.replace(pathWithSlash + 'docs/');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
